name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: RN-CLI-App/yarn.lock

      - name: Install dependencies
        working-directory: RN-CLI-App
        run: yarn install --frozen-lockfile

      - name: Lint
        working-directory: RN-CLI-App
        run: yarn lint

      - name: Type Check
        working-directory: RN-CLI-App
        run: yarn typecheck

      - name: Unit Tests
        working-directory: RN-CLI-App
        run: yarn test --coverage --ci

  android-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: RN-CLI-App/yarn.lock

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        working-directory: RN-CLI-App
        run: yarn install --frozen-lockfile

      - name: Build Android
        working-directory: RN-CLI-App/android
        run: ./gradlew assembleDebug --no-daemon

  ios-build:
    runs-on: macos-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: RN-CLI-App/yarn.lock

      - name: Install dependencies
        working-directory: RN-CLI-App
        run: yarn install --frozen-lockfile

      - name: Install CocoaPods
        working-directory: RN-CLI-App/ios
        run: pod install

      - name: Build iOS
        working-directory: RN-CLI-App/ios
        run: xcodebuild -workspace RnCliApp.xcworkspace -scheme RnCliApp -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 16' build CODE_SIGNING_ALLOWED=NO
